base_config: imagenet1k.yaml

dataset:
  name: cifar10
  root: /path/to/cifar10

runtime:
  batch_size: 128
  num_workers: 4

stage1:
  output_checkpoint: outputs/rearranged/cifar10_vit_base_rearranged.pt

stage2:
  checkpoint_path: outputs/rearranged/cifar10_vit_base_rearranged.pt
  output_dir: outputs/elastic/cifar10

stage3:
  elastic_checkpoint: outputs/elastic/cifar10/elastic_epoch_30.pt
  output_dir: outputs/router/cifar10
